<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>I'M NOT A ZGEG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="steps-container">
    <!-- ÉTAPE 1 : VRAI KAPTCHA DÉFORMÉ -->
    <div id="step1" class="step-card">
        <div class="step-header">
            <span class="step-badge">● ÉTAPE 1 / 3</span>
            <span class="step-title">CAPTCHA</span>
        </div>
        
        <!-- Zone du Captcha déformé -->
        <div class="captcha-container">
            <canvas id="captchaCanvas" class="captcha-canvas"></canvas>
        </div>
        
        <div class="captcha-input">
            <input type="text" id="kaptchaInput" placeholder="Gamberge" autocomplete="off" spellcheck="false">
        </div>
        <div id="errorMsg" class="error-msg"></div>
        
        <!-- Box I'm not a robot -->
        <div id="recaptchaBox" class="recaptcha-box">
            <div class="checkbox-area">
                <div class="fake-checkbox" id="recaptchaCheckIcon">☐</div>
                <div class="recaptcha-text">I'm not a robot</div>
            </div>
            <div class="recaptcha-logo">
                <span>reCAPTCHA</span>
                <span>⟳</span>
            </div>
        </div>
        <div id="recaptchaVerifyMsg" class="verif-badge"></div>
        
        <div class="progress-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="footnote">Recopiez le code déformé + case à cocher</div>
    </div>

    <!-- ÉTAPE 2 : sélectionner les carrés avec MA PHOTO -->
    <div id="step2" class="step-card hidden">
        <div class="step-header">
            <span class="step-badge">📸 ÉTAPE 2 / 3</span>
            <span class="step-title">TROUVEZ-MOI</span>
        </div>
        <div class="grid-prompt">
            <p>Sélectionnez les carrés où <strong style="color:#8effd4;">y'a un BG</strong></p>
        </div>
        
        <div class="image-grid" id="imageGrid"></div>
        
        <div id="gridError" class="error-msg" style="margin-top: 12px;"></div>
        <button class="action-btn" id="verifyGridBtn">✓ VÉRIFIER</button>
        
        <div class="progress-dots">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
        <div class="footnote">Cliquez sur tous les blocs où je me trouve</div>
    </div>

    <!-- ÉTAPE 3 : validation finale -->
    <div id="step3" class="step-card hidden">
        <div class="step-header">
            <span class="step-badge">✓ VÉRIFIÉ ✓</span>
        </div>
        <div class="final-message"></div>
        <button class="action-btn" id="resetBtn">⟳ RECOMMENCER</button>
        <div class="progress-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
        </div>
        <div class="footnote">version 1.0</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
